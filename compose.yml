services:
  app:
    container_name: ai_summarizer_bot_app
    build:
      context: .
      args:
        APP_ENV: ${APP_ENV:-production}
    env_file:
      - .env
    environment:
      PHP_IDE_CONFIG: serverName=ChatTube
    depends_on:
      - db
    volumes:
      - .:/var/www/html
    ports:
      - "${APP_PORT:-80}:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10M"
        max-file: "5"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://0.0.0.0:80/up" ]
      interval: 30s
      timeout: 10s
      retries: 6
  db:
    container_name: ai_summarizer_bot_db
    build: .docker/db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    shm_size: 1g
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - .docker/db/data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "100M"
        max-file: "5"
  redis:
    container_name: ai_summarizer_bot_redis
    build: .docker/redis
    command: redis-server --appendonly yes
    restart: unless-stopped
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - .docker/redis/data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "100M"
        max-file: "5"
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
