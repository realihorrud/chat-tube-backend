services:
  app:
    image: ghcr.io/realihorrud/chat-tube-backend/app:latest
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "80:80"
    restart: unless-stopped

  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: